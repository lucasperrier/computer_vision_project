defaults:
  - data: default
  - model: resnet50
  - mlflow: default
  - service: default
  - _self_

task: inference
seed: 42
run_name: "inference_${model.name}"
checkpoint_path: null
device: auto
image_path: null

preprocessing:
  image_size: 224
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]