defaults:
  - data: default
  - model: resnet50
  - trainer: default
  - mlflow: default
  - _self_

task: train
seed: 42
run_name: "train_${model.name}"
checkpoint_path: null

preprocessing:
  image_size: 224
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]
  hflip_p: 0.5
  brightness_contrast_p: 0.3
  shift_scale_rotate_p: 0.3
  shift_limit: 0.03
  scale_limit: 0.05
  rotate_limit: 10